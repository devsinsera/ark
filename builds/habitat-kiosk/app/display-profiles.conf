# Sinsera kiosk — optimized display list.
# Format:  MATCH | SCALE | LABEL
#   MATCH  = case-insensitive substring tested against the monitor's EDID model
#            name (from edid-decode). First match wins.
#   SCALE  = chromium --force-device-scale-factor (UI zoom). Native resolution is
#            always kept crisp; only the UI scale changes.
# Unknown screens fall back to a resolution-based rule (see kiosk-display.sh):
#   3840x2160 -> 2 · 3440x1440 -> 1.25 · 2560x1440 -> 1.25 · 1920x1080 -> 1.
# Add a new screen by appending one line.

# ── Sony Bravia TVs (4K, far viewing → big UI) ──
KD-75X77L      | 2    | Sony Bravia 75" (KD-75X77L, 4K)
KD-65X7000G    | 2    | Sony Bravia 65" (KD-65X7000G, 4K)
# generic Sony EDID names sometimes report just "SONY" — catch 4K Sonys too
SONY           | 2    | Sony Bravia (4K)

# ── Lenovo curved monitors ──
R34W-30        | 1.25 | Lenovo 34" curved (R34w-30, 3440x1440 ultrawide)
R27FC-30       | 1    | Lenovo 27" curved (R27FC-30, 1920x1080)

# ── GeeekPi 18.5" portable IPS touch (1920x1080) ──
# Portable panels usually report a generic EDID name → handled by the 1080p
# resolution fallback (scale 1). Add an explicit line here if its EDID name is
# distinctive, e.g.:  GeeekPi | 1 | GeeekPi 18.5" touch
