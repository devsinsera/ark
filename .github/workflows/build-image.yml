# Ark CI image builder — Phase 3.7.
#
# Triggered manually or on a release/* tag push. Spins up a native
# arm64 Linux runner (GitHub-hosted, free for public repos), builds
# the ark-builder Docker image, runs the chroot pipeline against a
# base .img, and uploads the resulting ark-built.img + .sha256 +
# install.log as workflow artefacts.
#
# Inputs (workflow_dispatch):
#   plan_path   path inside the repo to install.plan.sh
#   base_url    URL to download the base .img from (DietPi mirror, etc.)
#   compress    whether to xz-compress the output (true/false)
#
# Without inputs (release tag push), uses sensible defaults pulled
# from the manifest of the latest 'main' build.

name: build-image

on:
  workflow_dispatch:
    inputs:
      plan_path:
        description: "Path to install.plan.sh inside the repo"
        required: true
        default: "builds/phase3-validate/install.plan.sh"
      base_url:
        description: "URL to download the base .img.xz from"
        required: true
        default: "https://dietpi.com/downloads/images/DietPi_RPi5-ARMv8-Trixie.img.xz"
      compress:
        description: "xz-compress the output (true/false)"
        required: false
        default: "true"
  push:
    tags:
      - "release/*"

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # native arm64 — no qemu emulation needed
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sanity check — host arch + docker
        run: |
          uname -m
          docker version
          df -h .

      - name: Set up disk space for the .img
        # Free-tier runners have limited disk; cleaning unused
        # toolchains buys us ~20 GB which is enough for a 4 GB image
        # build + working copy.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h .

      - name: Download base image
        run: |
          mkdir -p Os
          curl -fsSL -o Os/base.img.xz "${{ github.event.inputs.base_url || 'https://dietpi.com/downloads/images/DietPi_RPi5-ARMv8-Trixie.img.xz' }}"
          xz -d Os/base.img.xz
          ls -lh Os/base.img

      - name: Choose plan
        id: plan
        run: |
          plan="${{ github.event.inputs.plan_path }}"
          if [ -z "$plan" ]; then plan="builds/phase3-validate/install.plan.sh"; fi
          if [ ! -f "$plan" ]; then
            echo "::error::plan file not found: $plan"
            exit 1
          fi
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

      - name: Build via ark-builder
        run: |
          set -euxo pipefail
          mkdir -p builds/ci-build/out
          flags=""
          if [ "${{ github.event.inputs.compress || 'true' }}" = "true" ]; then flags="--compress"; fi
          node builder/ark-builder.mjs build \
            --plan "${{ steps.plan.outputs.plan }}" \
            --base Os/base.img \
            --out builds/ci-build/out \
            $flags

      - name: Upload built image + log
        uses: actions/upload-artifact@v4
        with:
          name: ark-built-${{ github.run_number }}
          path: |
            builds/ci-build/out/ark-built.img
            builds/ci-build/out/ark-built.img.xz
            builds/ci-build/out/ark-built.sha256
            builds/ci-build/out/ark-built.img.xz.sha256
            builds/ci-build/out/ark-build.log
          if-no-files-found: warn
          retention-days: 14
