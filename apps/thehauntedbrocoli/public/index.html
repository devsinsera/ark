<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TheHauntedBrocoli</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23060a10'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='38' fill='%2322c55e'%3E%F0%9F%A5%A6%3C/text%3E%3C/svg%3E">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html,body { height: 100%; margin: 0; }
  body {
    background: #060a10;
    color: #cbd5e1;
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 32px 32px; gap: 36px; min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(34,197,94,0.05) 0, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(167,139,250,0.05) 0, transparent 35%);
  }
  header {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  h1 {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 26px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #e2e8f0;
    margin: 0;
  }
  .subtitle {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px; color: #475569; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    width: 100%; max-width: 1280px;
  }
  .tile {
    background: rgba(15,23,42,0.7);
    border: 1px solid rgba(148,163,184,0.12);
    border-left: 3px solid var(--ac);
    border-radius: 10px;
    padding: 22px 22px 24px;
    color: inherit; text-decoration: none;
    display: flex; flex-direction: column; gap: 6px; min-height: 130px;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }
  .tile:hover {
    transform: translateY(-2px);
    background: rgba(15,23,42,0.95);
    border-color: var(--ac);
  }
  .tile.disabled { opacity: 0.4; cursor: not-allowed; }
  .tile.disabled:hover { transform: none; background: rgba(15,23,42,0.7); border-color: rgba(148,163,184,0.12); border-left-color: var(--ac); }
  .title-row {
    display: flex; align-items: baseline; gap: 10px;
  }
  .title {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 22px; color: #f1f5f9; letter-spacing: 0.02em;
  }
  .badge {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--ac);
    padding: 2px 7px; border: 1px solid currentColor; border-radius: 999px;
    line-height: 1;
  }
  .desc {
    font-size: 13px; line-height: 1.55; color: #94a3b8;
    margin-top: 4px;
  }
  .quicklinks {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }
  .quicklinks .ql-label {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
    color: #475569; align-self: center; margin-right: 4px;
  }
  .quicklinks a {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px; color: #cbd5e1;
    padding: 6px 12px;
    background: rgba(15,23,42,0.5);
    border: 1px solid rgba(148,163,184,0.18);
    border-radius: 999px;
    text-decoration: none;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .quicklinks a:hover {
    background: rgba(15,23,42,0.9);
    border-color: #475569;
    color: #f1f5f9;
  }
  footer {
    margin-top: auto; padding-top: 24px;
    color: #475569; font-family: ui-monospace, Menlo, monospace; font-size: 11px;
    display: flex; gap: 16px;
  }
  footer .dot { color: #1e293b; }
</style>
</head>
<body>
  <header>
    <h1>TheHauntedBrocoli</h1>
    <div class="subtitle">Launcher · Pi 5</div>
  </header>

  <div class="grid" id="grid"></div>

  <div class="quicklinks">
    <span class="ql-label">Quick links</span>
    <a href="https://github.com" target="_blank" rel="noopener">github.com</a>
    <a href="https://supabase.com" target="_blank" rel="noopener">supabase.com</a>
    <a href="https://vercel.com" target="_blank" rel="noopener">vercel.com</a>
  </div>

  <footer>
    <span id="host">…</span>
    <span class="dot">·</span>
    <span id="version">…</span>
    <span class="dot">·</span>
    <span id="uptime">…</span>
  </footer>

<script>
const TILES = [
  {
    title: 'Claude',
    badge: 'AI · terminal',
    desc:  'Claude Code CLI in a dedicated pop-out window (ttyd, port 7777). Looks + feels like a native app.',
    href:  'http://localhost:7777',
    colour: '#22c55e',
    popup: true,
    width: 1400,
    height: 900,
  },
  {
    title: 'Ark',
    badge: 'fleet + recon',
    desc:  'Pi fleet, manifests, network scans, alerts, and the Can’t Phish Here recon tools (Flipper / RaspyJack / Ragnar tabs).',
    href:  'https://sinsera.co/ark/',
    colour: '#06b6d4',
  },
  {
    title: 'Ragnar',
    badge: 'recon stack',
    desc:  'Autonomous network discovery + vuln + cred dashboard. Runs on JackTheFlipper.',
    href:  'http://192.168.4.175:8091',
    colour: '#a78bfa',
  },
  {
    title: 'RaspyJack',
    badge: 'attack toolkit',
    desc:  'LCD-driven attack toolkit. Drive remotely from Ark → Can’t Phish Here → RaspyJack. Run only on hardware + networks you own.',
    href:  'http://192.168.4.167:7400/#/cph',
    colour: '#ef4444',
  },
  {
    title: 'Flipper',
    badge: 'rf bridge',
    desc:  'Read-only Flipper Zero bridge (5 commands: info, ble-scan, sub-GHz listen, NFC detect, power). Drive from Ark.',
    href:  'http://192.168.4.167:7400/#/cph',
    colour: '#f472b6',
  },
  {
    title: 'Jailbreak',
    badge: 'in development',
    desc:  'Your in-flight project. Tile updates the moment you wire it up.',
    href:  '#',
    colour: '#fbbf24',
    disabled: true,
  },
  {
    title: 'Payroll',
    badge: 'soon',
    desc:  'Placeholder — your Payroll app will live here once it’s deployed.',
    href:  '#',
    colour: '#64748b',
    disabled: true,
  },
  {
    title: 'Tor Exit',
    badge: 'sanity check',
    desc:  'Verify Tor SOCKS5 is actually proxying traffic (returns the visible exit IP through Tor).',
    href:  'https://check.torproject.org/',
    colour: '#fb923c',
  },
];

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = TILES.map(t => {
    const dis = t.disabled ? ' disabled' : '';
    // Default: open in a new tab (target=_blank). Tiles can opt into a
    // pop-out app window via `popup: true` — opens as a standalone
    // window with no tabs/address bar, like a native app.
    let attrs;
    if (t.disabled) {
      attrs = '';
    } else if (t.popup) {
      const features = `popup=yes,width=${t.width||1400},height=${t.height||900},resizable=yes,scrollbars=yes`;
      attrs = `href="${t.href}" onclick="event.preventDefault(); window.open(this.href, '${t.title}', '${features}'); return false;"`;
    } else {
      attrs = `href="${t.href}" target="_blank" rel="noopener"`;
    }
    return `<a ${attrs} class="tile${dis}" style="--ac:${t.colour}">
      <div class="title-row">
        <span class="title">${t.title}</span>
        <span class="badge">${t.badge}</span>
      </div>
      <div class="desc">${t.desc}</div>
    </a>`;
  }).join('');
}

async function loadHealth() {
  try {
    const r = await fetch('/api/health');
    if (!r.ok) return;
    const j = await r.json();
    document.getElementById('host').textContent = `${j.host} (${j.ip})`;
    document.getElementById('version').textContent = `v${j.version}`;
    document.getElementById('uptime').textContent  = `uptime ${j.uptime_s}s`;
  } catch {}
}

render();
loadHealth();
setInterval(loadHealth, 15000);
</script>
</body>
</html>
